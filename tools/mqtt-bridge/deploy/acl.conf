# Mosquitto ACL for the ADOS cloud relay.
#
# Loaded by mosquitto.conf only when the Production block is active (see
# `README.md` in this directory for the deployment runbook). Mosquitto's
# ACL semantics are "deny by default": any topic not explicitly granted
# below is denied.
#
# Topology:
#   Agent publishes/subscribes under `ados/<device_id>/...` with
#     username = "<device_id>" (no prefix), set by the agent's MQTT client
#     (ADOSDroneAgent/src/ados/services/mqtt/gateway.py around line 75).
#   Bridge subscribes to the wildcard tree to forward into Convex
#     (tools/mqtt-bridge/src/index.ts; MQTT_USERNAME env var).
#
# Three principals:
#   1. Per-device agent (username == device_id): readwrite on its own
#      device subtree only. Pattern substitution uses `%u` for the
#      connected username, so `pattern readwrite ados/%u/#` matches
#      exactly one subtree per agent. An agent with username `droneA`
#      cannot reach `ados/droneB/#`. By construction the agent's
#      device_id and its MQTT username are the same string.
#   2. Bridge service account (username `ados`): read-only across all
#      `ados/+/...` topics so it can forward agent traffic to Convex.
#      The bridge does not need to publish on the agent-facing tree;
#      downstream command flow uses Convex HTTP, not MQTT publishes
#      from the bridge.
#   3. Reserved system topics (`$SYS/#`): admin only. The default deny
#      handles this — no `pattern` line below references `$SYS`, so no
#      agent or bridge user can subscribe to it.
#
# Pattern substitution variables (mosquitto ACL):
#   %u  connected username
#   %c  connected client_id

# Agents: readwrite on their own subtree, identified by username == device_id.
pattern readwrite ados/%u/#

# Bridge service account: read everything under `ados/`. Username is set in
# the bridge container's MQTT_USERNAME env var; it must match the entry in
# /mosquitto/config/passwd created via `mosquitto_passwd`.
user ados
topic read ados/#

# Sysadmin / monitoring (optional). Uncomment and create the user via
# mosquitto_passwd before relying on this. The `$SYS/#` tree is mosquitto's
# internal broker stats; without this block it remains inaccessible.
# user ados-admin
# topic readwrite #
# topic read $SYS/#
