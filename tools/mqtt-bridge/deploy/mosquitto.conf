# Mosquitto broker config for the ADOS cloud relay.
#
# Two modes are supported:
#
#   1. Bench / development: anonymous access on plain TCP and WebSockets.
#      Suitable for solo-founder benchwork and CI fixtures. To enable,
#      comment out the production block below and uncomment the bench
#      block at the bottom.
#
#   2. Production (default below): anonymous OFF, per-device
#      username+password backed by a password_file, per-device topic ACL
#      backed by acl_file. The agent presents
#        username = "<device_id>"     (the bare device_id; no prefix)
#        password = <api_key>         (issued during pairing)
#      The bridge presents `MQTT_USERNAME` / `MQTT_PASSWORD` from its
#      container env. See `README.md` in this directory for the
#      deployment runbook, including how to generate `/mosquitto/config/passwd`
#      from paired devices and how to wire the bridge service account.

# --- Production (default) ---
listener 1883
listener 9001
protocol websockets
allow_anonymous false
password_file /mosquitto/config/passwd
acl_file      /mosquitto/config/acl.conf
persistence true
persistence_location /mosquitto/data/
autosave_interval 1800

# --- Bench / development (anonymous; for local CI fixtures only) ---
# listener 1883
# listener 9001
# protocol websockets
# allow_anonymous true
# persistence true
# persistence_location /mosquitto/data/
# autosave_interval 1800
