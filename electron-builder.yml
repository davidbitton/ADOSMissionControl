appId: com.altnautica.command
productName: Altnautica Command

# The Electron wrapper packages only dist-electron and the prebuilt Next
# standalone server (see files / extraResources); no native node modules are
# shipped or loaded at runtime. Skipping the native rebuild avoids needing a
# C toolchain on the build runners (the Windows runner has no Visual Studio,
# which otherwise fails rebuilding a transitive native watcher dependency).
npmRebuild: false

directories:
  output: release

files:
  - "dist-electron/**/*"
  - "package.json"

afterPack: scripts/afterPack.cjs

extraResources:
  - from: ".next/standalone"
    to: "standalone"
  - from: ".next/static"
    to: "standalone/.next/static"
  - from: "public"
    to: "standalone/public"

mac:
  artifactName: "AltnauticaCommand-${version}-${arch}.${ext}"
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  category: public.app-category.utilities
  icon: electron/icons/icon.icns
  darkModeSupport: true

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: electron/icons/icon.ico

linux:
  target:
    - target: AppImage
      arch:
        - x64
  category: Utility
  icon: electron/icons/icon.png

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  artifactName: "AltnauticaCommand-${version}-Setup.${ext}"

appImage:
  artifactName: "AltnauticaCommand-${version}-${arch}.${ext}"

dmg:
  title: "Altnautica Command"

publish:
  provider: github
  owner: altnautica
  repo: ADOSMissionControl
